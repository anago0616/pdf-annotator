<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a73e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PDFノート">
<title>PDFノート - 注釈・共有</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>

<!-- 起動スプラッシュ(読み込み中の挿絵) -->
<div id="splash" class="splash">
  <div class="splash-inner">
    <svg class="splash-art" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true">
      <!-- 影 -->
      <rect x="34" y="26" width="92" height="128" rx="10" fill="rgba(0,0,0,.18)"/>
      <!-- 用紙 -->
      <rect x="30" y="20" width="92" height="128" rx="10" fill="#ffffff"/>
      <!-- 折り返し -->
      <path d="M104 20 L122 38 L104 38 Z" fill="#e3e9f2"/>
      <!-- 本文の行 -->
      <g fill="#cdd6e4">
        <rect class="ln" x="44" y="46" width="64" height="7" rx="3.5"/>
        <rect class="ln" x="44" y="62" width="64" height="7" rx="3.5"/>
        <rect class="ln" x="44" y="78" width="48" height="7" rx="3.5"/>
      </g>
      <!-- 手書き風の波線(描かれていくアニメ) -->
      <path id="splashStroke" d="M44 112 C58 98, 70 126, 84 112 S110 98, 116 112"
            fill="none" stroke="#d93025" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- ペン先(波線に沿って移動) -->
      <g id="splashPen">
        <path d="M0 0 l13 5 l-5 5 z" fill="#1a73e8"/>
        <rect x="7" y="-1" width="22" height="5" rx="2.5" transform="rotate(22)" fill="#3a86ff"/>
        <animateMotion dur="2.4s" repeatCount="indefinite" rotate="auto"
          keyPoints="0;1;1" keyTimes="0;0.62;1" calcMode="linear">
          <mpath xlink:href="#splashStroke" href="#splashStroke"/>
        </animateMotion>
      </g>
    </svg>
    <div class="splash-title">📄 PDFノート</div>
    <div class="splash-sub">読み込み中…</div>
    <div class="splash-bar"><span></span></div>
  </div>
</div>

<!-- ホーム画面 -->
<div id="homeView" class="view" hidden>
  <header class="home-header">
    <div class="home-header-row">
      <h1>📄 PDFノート</h1>
      <button id="syncBtn" class="join-btn">📲 端末を同期</button>
    </div>
    <p class="subtitle">PDFに書き込み・共有できるノートアプリ <span id="homeSyncState" class="home-sync-state" hidden></span></p>
  </header>
  <main id="docList" class="doc-list"></main>
  <div id="emptyState" class="empty-state" hidden>
    <div class="empty-icon">📂</div>
    <p>PDFがまだありません</p>
    <p class="empty-sub">右下の「＋」からPDFを追加してください</p>
  </div>
  <button id="addBtn" class="fab" title="PDFを追加">＋</button>
  <input type="file" id="fileInput" accept="application/pdf,.pdf" multiple hidden>
</div>

<!-- 編集画面 -->
<div id="editorView" class="view" hidden>
  <header class="editor-header">
    <button id="backBtn" class="icon-btn" title="戻る">←</button>
    <span id="docTitle" class="doc-title"></span>
    <span id="shareState" class="share-state" hidden></span>
    <span id="saveStatus" class="save-status"></span>
    <button id="liveBtn" class="icon-btn" title="共同編集">🔗</button>
    <button id="shareBtn" class="icon-btn" title="PDFを書き出して共有">📤</button>
  </header>

  <main id="pageContainer" class="page-container"></main>

  <div class="toolbar">
    <div class="tool-row" id="optionRow">
      <div class="color-swatches" id="colorSwatches"></div>
      <input type="range" id="widthSlider" min="1" max="24" value="3" title="太さ">
      <span id="widthLabel" class="width-label">3</span>
    </div>
    <div class="tool-row">
      <button class="tool-btn active" data-tool="hand" title="スクロール">✋</button>
      <button class="tool-btn" data-tool="pen" title="ペン">✏️</button>
      <button class="tool-btn" data-tool="marker" title="マーカー">🖍️</button>
      <button class="tool-btn" data-tool="text" title="テキスト">🅣</button>
      <button class="tool-btn" data-tool="eraser" title="消しゴム">🧽</button>
      <span class="spacer"></span>
      <button id="undoBtn" class="tool-btn" title="元に戻す">↩️</button>
      <button id="zoomOutBtn" class="tool-btn" title="縮小">－</button>
      <button id="zoomInBtn" class="tool-btn" title="拡大">＋</button>
    </div>
  </div>

  <!-- テキスト入力ポップアップ -->
  <div id="textEditor" class="text-editor" hidden>
    <textarea id="textInput" rows="3" placeholder="テキストを入力"></textarea>
    <div class="text-editor-actions">
      <button id="textCancelBtn">キャンセル</button>
      <button id="textDeleteBtn" class="danger" hidden>削除</button>
      <button id="textOkBtn" class="primary">確定</button>
    </div>
  </div>
</div>

<!-- 取り込みダイアログ -->
<div id="importDialog" class="share-dialog" hidden>
  <div class="share-dialog-box">
    <h3>📥 PDFを取り込み</h3>
    <p id="importInfo" class="share-desc"></p>
    <input id="importCategory" class="dialog-input" list="categoryList" placeholder="タイトル(例: 会議資料)" maxlength="30">
    <datalist id="categoryList"></datalist>
    <div class="text-editor-actions">
      <button id="importCancelBtn">キャンセル</button>
      <button id="importOkBtn" class="primary">取り込む</button>
    </div>
  </div>
</div>

<!-- 端末同期ダイアログ -->
<div id="syncDialog" class="share-dialog" hidden>
  <div class="share-dialog-box">
    <h3>📲 端末間で同期</h3>
    <!-- 同期オフ -->
    <div id="syncOffView">
      <p class="share-desc">このアプリのPDF・書き込み・追加・削除を、PCとスマホなど複数の端末でまるごとリアルタイム同期します。</p>
      <div class="text-editor-actions" style="flex-direction:column; gap:8px;">
        <button id="syncStartBtn" class="primary" style="width:100%;">この端末で同期を開始</button>
        <button id="syncJoinBtn" style="width:100%;">他の端末のコードで参加</button>
      </div>
    </div>
    <!-- 同期オン -->
    <div id="syncOnView" hidden>
      <p class="share-desc">他の端末でこのコードを「📲 端末を同期 → コードで参加」に入力すると、同じライブラリが同期されます。</p>
      <div id="syncCodeDisplay" class="share-code"></div>
      <div class="text-editor-actions">
        <button id="syncCopyBtn">コードをコピー</button>
        <button id="syncStopBtn" class="danger">同期を解除</button>
      </div>
    </div>
    <div class="text-editor-actions" style="margin-top:10px;">
      <button id="syncCloseBtn" class="primary">閉じる</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
